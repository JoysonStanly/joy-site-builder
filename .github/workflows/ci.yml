name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  #  CLIENT — React + Vite + TypeScript
  # ─────────────────────────────────────────────
  client:
    name: 🖥️ Client (Lint · Typecheck · Build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (Vite)
        run: npm run build
        env:
          # Add any public env vars your Vite build needs here
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  #  SERVER — Express + TypeScript + Prisma
  # ─────────────────────────────────────────────
  server:
    name: 🔧 Server (Typecheck · Build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies (+ Prisma generate via postinstall)
        run: npm ci
        env:
          # Prisma generate needs a valid DATABASE_URL format at install time.
          # Use a dummy DSN; it won't actually connect.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Type-check (tsc)
        run: npx tsc --noEmit

      - name: Build (tsc compile)
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

  # ─────────────────────────────────────────────
  #  CD — Deploy to Render (runs only on main)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: [client, server]          # only deploy if BOTH CI jobs pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy — Client (Static Site)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request GET \
            "${{ secrets.RENDER_CLIENT_DEPLOY_HOOK }}" | grep -q "^2" \
          && echo "✅ Client deploy triggered" \
          || echo "⚠️  Client deploy hook returned non-2xx (check secret)"

      - name: Trigger Render deploy — Server (Web Service)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request GET \
            "${{ secrets.RENDER_SERVER_DEPLOY_HOOK }}" | grep -q "^2" \
          && echo "✅ Server deploy triggered" \
          || echo "⚠️  Server deploy hook returned non-2xx (check secret)"
